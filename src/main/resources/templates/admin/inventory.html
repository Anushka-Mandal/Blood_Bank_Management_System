<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>BBMS — Inventory</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments :: admin-sidebar}"></div>
  <div class="main-content">
    <div class="topbar"><span class="topbar-title">Blood Inventory Management</span></div>
    <div class="page-body">
      <div th:replace="~{fragments :: alerts}"></div>

      <!-- Stock grid -->
      <div class="card" style="margin-bottom:28px;">
        <div class="card-header"><h3><span class="page-accent"></span>Stock Levels by Blood Group</h3></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;">
            <div th:each="inv : ${inventory}"
                 style="background:var(--mist);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border);">
              <div class="blood-group-badge" th:text="${inv.bloodGroup}" style="font-size:1.1rem;margin-bottom:12px;display:block;"></div>
              <div style="font-family:'Playfair Display',serif;font-size:2.2rem;color:var(--navy);line-height:1;"
                   th:text="${inv.availableUnits}">0</div>
              <div style="font-size:0.72rem;color:var(--slate);margin:4px 0 10px;">available units</div>
              <div class="inv-bar">
                <div class="inv-bar-fill"
                     th:classappend="${inv.stockLevel == 'ADEQUATE'} ? 'adequate' : (${inv.stockLevel == 'LOW'} ? 'low' : 'critical')"
                     th:style="'width:' + ${inv.availableUnits > 30 ? 100 : (inv.availableUnits * 100 / 30)} + '%'"></div>
              </div>
              <div style="margin-top:8px;">
                <span class="badge"
                      th:classappend="${inv.stockLevel == 'ADEQUATE'} ? 'badge-approved' : (${inv.stockLevel == 'LOW'} ? 'badge-pending' : 'badge-critical')"
                      th:text="${inv.stockLevel}"></span>
              </div>
              <div style="margin-top:10px;font-size:0.75rem;color:var(--slate);">
                Total: <span th:text="${inv.totalUnits}">0</span> |
                Reserved: <span th:text="${inv.reservedUnits}">0</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- All Blood Units Table -->
      <div class="card">
        <div class="card-header">
          <h3><span class="page-accent"></span>All Blood Units</h3>
          <span class="badge badge-navy" th:text="${allUnits.size()} + ' total'"></span>
        </div>
        <div class="card-body" style="padding:0;">
          <div th:if="${allUnits.empty}" class="empty-state">
            <div class="icon">🩸</div>
            <p>No blood units in the system yet. Collect blood from donors first.</p>
          </div>
          <div th:unless="${allUnits.empty}" class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Unit ID</th><th>Blood Group</th><th>Donor</th>
                  <th>Collected</th><th>Expiry</th><th>Test Status</th>
                  <th>Available</th><th>Tested By</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="unit : ${allUnits}">
                  <td><span class="badge badge-navy" th:text="'#' + ${unit.bloodId}"></span></td>
                  <td><span class="blood-group-badge" th:text="${unit.bloodGroup}"></span></td>
                  <td th:text="${unit.donor != null ? unit.donor.name : '—'}">—</td>
                  <td th:text="${#temporals.format(unit.collectedAt,'dd MMM yyyy')}">—</td>
                  <td th:text="${unit.expiryDate}">—</td>
                  <td>
                    <span class="badge"
                          th:classappend="${unit.testStatus.name() == 'SAFE'} ? 'badge-safe' : (${unit.testStatus.name() == 'UNSAFE'} ? 'badge-rejected' : 'badge-pending')"
                          th:text="${unit.testStatus}">PENDING</span>
                  </td>
                  <td>
                    <span class="badge" th:classappend="${unit.available} ? 'badge-approved' : 'badge-navy'"
                          th:text="${unit.available ? 'YES' : 'NO'}"></span>
                  </td>
                  <td th:text="${unit.testResult != null ? unit.testResult.testedBy : '—'}">—</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
